# /pi-2026/docker-compose.yml
version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: poc-mysql
    environment:
      MYSQL_DATABASE: cloud_poc_db
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build:
      context: ./cloud-poc-api
    container_name: poc-symfony-api
    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      # This overrides the .env file in Symfony.
      # Notice we use the service name "db" instead of 127.0.0.1
      DATABASE_URL: "mysql://root@db:3306/cloud_poc_db?serverVersion=8.0"

  ui:
    build:
      context: ./cloud-poc-ui
    container_name: poc-angular-ui
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  db_data: